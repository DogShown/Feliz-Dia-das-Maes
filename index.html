<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Dia das Mães 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cinema"></div>
<canvas id="scene"></canvas>

<div class="overlay">
    <footer class="footer-note">Com amor, para a mulher mais especial do mundo.</footer>

    <div class="act act-1 active">
        <p class="small">... silêncio ...</p>
    </div>

    <div class="act act-2">
        <h1>Feliz Dia das Mães 🌷</h1>
    </div>

    <div class="act act-3">
        <div class="main-message">
            <p id="message"></p>
            <button id="next">Nova mensagem ✨</button>
        </div>

        <div class="presents-grid">
            <div class="card-present" onclick="openCard(this)">
                <div class="card-inner">
                    <div class="card-front">🎁 <span>Toque</span></div>
                    <div class="card-back">Sua Força <small>me guia.</small></div>
                </div>
            </div>
            <div class="card-present" onclick="openCard(this)">
                <div class="card-inner">
                    <div class="card-front">🎁 <span>Toque</span></div>
                    <div class="card-back">Seu Amor <small>me protege.</small></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
